name: Build Win7/2008R2 (ad-hoc)

# Build thử bản legacy cho Windows 7 / Server 2008 R2 (x64).
# Chạy tự động mỗi lần push nhánh legacy-win7, hoặc bấm tay ở tab Actions.
# Kết quả (.msi/.exe) tải về ở mục Artifacts của lần chạy — KHÔNG tạo release.
on:
  push:
    branches: [legacy-win7]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Rust 1.77.2 = bản cuối còn hỗ trợ Windows 7 / Server 2008 R2 ở tier chuẩn.
      # (rust-toolchain.toml cũng ghim sẵn cùng phiên bản.)
      - name: Cài Rust 1.77.2
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.77.2
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Dùng npm install (không phải ci): package-lock.json còn ghi CLI v2.
      - name: Cài frontend CLI (Tauri v1)
        run: npm install

      - name: Build bản cài Windows
        run: npm run build

      - name: Tải kết quả lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backup-helper-win7-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
